/* ── OrgComboBox ── */
function OrgComboBox({value, onChange, orgs}) {
  const [open, setOpen] = useState(false)
  const [input, setInput] = useState(value||"")
  const ref = useRef(null)
  useEffect(()=>{ setInput(value||"") }, [value])
  useEffect(()=>{
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false) }
    document.addEventListener("mousedown", h)
    return () => document.removeEventListener("mousedown", h)
  }, [])
  const list = input ? orgs.filter(o=>o.toLowerCase().includes(input.toLowerCase())&&o!==input) : orgs
  const sel = v => { setInput(v); onChange(v); setOpen(false) }
  return (
    <div ref={ref} style={{position:"relative"}}>
      <div style={{display:"flex"}}>
        <input value={input} onChange={e=>{setInput(e.target.value);onChange(e.target.value);setOpen(true)}} onFocus={()=>setOpen(true)} placeholder="직접 입력 또는 선택"
          style={{flex:1,padding:"8px 11px",borderRadius:"7px 0 0 7px",border:"1px solid #e2e8f0",borderRight:"none",fontSize:13,outline:"none"}}/>
        <button type="button" onClick={()=>setOpen(o=>!o)} style={{padding:"0 9px",border:"1px solid #e2e8f0",borderRadius:"0 7px 7px 0",background:"#f8fafc",cursor:"pointer",fontSize:11,color:"#64748b"}}>{open?"▲":"▼"}</button>
      </div>
      {open && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,zIndex:300,boxShadow:"0 8px 24px rgba(0,0,0,0.1)",maxHeight:150,overflowY:"auto",marginTop:2}}>
          {list.map(o => (
            <div key={o} onMouseDown={()=>sel(o)} style={{padding:"8px 12px",fontSize:13,cursor:"pointer"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>🏢 {o}</div>
          ))}
          {input.trim() && !orgs.includes(input.trim()) && (
            <div onMouseDown={()=>sel(input.trim())} style={{padding:"8px 12px",fontSize:13,cursor:"pointer",color:"#6366f1",fontWeight:600,borderTop:"1px solid #f1f5f9"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f5f3ff"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>+ "{input.trim()}" 새로 추가</div>
          )}
          {!input && !orgs.length && <div style={{padding:"10px 12px",fontSize:12,color:"#94a3b8"}}>직접 입력해보세요</div>}
        </div>
      )}
    </div>
  )
}

/* ── GroupComboBox ── */
function GroupComboBox({selected, onChange, groups, onCreateGroup}) {
  const [open, setOpen] = useState(false)
  const [q, setQ] = useState("")
  const ref = useRef(null)
  useEffect(()=>{
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false) }
    document.addEventListener("mousedown", h)
    return () => document.removeEventListener("mousedown", h)
  }, [])
  const unsel = groups.filter(g => !selected.includes(g.id))
  const fil = q ? unsel.filter(g=>g.name.includes(q)) : unsel
  const selG = selected.map(id=>groups.find(g=>g.id===id)).filter(Boolean)
  const add = id => { onChange([...selected, id]); setQ(""); setOpen(false) }
  const remove = id => onChange(selected.filter(x=>x!==id))
  const create = () => {
    if (!q.trim()) return
    const ng = onCreateGroup(q.trim())
    onChange([...selected, ng.id]); setQ(""); setOpen(false)
  }
  return (
    <div ref={ref} style={{position:"relative"}}>
      {selG.length > 0 && (
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:5}}>
          {selG.map(g => (
            <span key={g.id} style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:11,padding:"3px 8px",borderRadius:20,background:g.color,color:"#fff",fontWeight:600}}>
              {g.name}<span onClick={()=>remove(g.id)} style={{cursor:"pointer",fontSize:13,lineHeight:1,marginLeft:1}}>×</span>
            </span>
          ))}
        </div>
      )}
      <div style={{display:"flex"}}>
        <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true)}} onFocus={()=>setOpen(true)} placeholder="그룹 검색 또는 새로 만들기..."
          style={{flex:1,padding:"8px 11px",borderRadius:"7px 0 0 7px",border:"1px solid #e2e8f0",borderRight:"none",fontSize:13,outline:"none"}}/>
        <button type="button" onClick={()=>setOpen(o=>!o)} style={{padding:"0 9px",border:"1px solid #e2e8f0",borderRadius:"0 7px 7px 0",background:"#f8fafc",cursor:"pointer",fontSize:11,color:"#64748b"}}>{open?"▲":"▼"}</button>
      </div>
      {open && (
        <div style={{position:"absolute",top:"100%",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,zIndex:300,boxShadow:"0 8px 24px rgba(0,0,0,0.1)",maxHeight:160,overflowY:"auto",marginTop:2}}>
          {fil.map(g => (
            <div key={g.id} onMouseDown={()=>add(g.id)} style={{padding:"8px 12px",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7}}
              onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
              <div style={{width:8,height:8,borderRadius:"50%",background:g.color}}/>{g.name}
              <span style={{fontSize:10,color:"#94a3b8",marginLeft:"auto"}}>{g.members.length}명</span>
            </div>
          ))}
          {q.trim() && !groups.find(g=>g.name===q.trim()) && (
            <div onMouseDown={create} style={{padding:"8px 12px",fontSize:13,cursor:"pointer",color:"#6366f1",fontWeight:600,borderTop:fil.length?"1px solid #f1f5f9":"none"}}
              onMouseEnter={e=>e.currentTarget.style.background="#f5f3ff"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>+ "{q.trim()}" 새 그룹 만들기</div>
          )}
          {!q && !fil.length && <div style={{padding:"10px 12px",fontSize:12,color:"#94a3b8"}}>이름 입력 후 새 그룹 만들기</div>}
        </div>
      )}
    </div>
  )
}

/* ── RelatedPeopleSection ── */
function RelatedPeopleSection({selected, onChange, people, onCreatePerson}) {
  const [open, setOpen] = useState(false)
  const [q, setQ] = useState("")
  const [showAdd, setShowAdd] = useState(false)
  const [newName, setNewName] = useState("")
  const [newJob, setNewJob] = useState("")
  const ref = useRef(null)
  useEffect(()=>{
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false) }
    document.addEventListener("mousedown", h)
    return () => document.removeEventListener("mousedown", h)
  }, [])
  const avail = people.filter(p => !selected.includes(p.id) && (p.name.includes(q)||p.job?.includes(q)||p.org?.includes(q)))
  const selP = selected.map(id=>people.find(p=>p.id===id)).filter(Boolean)
  const add = id => { onChange([...selected, id]); setQ(""); setOpen(false) }
  const remove = id => onChange(selected.filter(x=>x!==id))
  const quickCreate = () => {
    if (!newName.trim()) return
    const np = onCreatePerson({name:newName.trim(), job:newJob.trim()})
    onChange([...selected, np.id]); setNewName(""); setNewJob(""); setShowAdd(false)
  }
  return (
    <div ref={ref} style={{position:"relative"}}>
      {selP.length > 0 && (
        <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:5}}>
          {selP.map(p => (
            <div key={p.id} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 8px 3px 5px",borderRadius:20,background:p.color+"18",border:`1px solid ${p.color}33`}}>

              <span onClick={()=>remove(p.id)} style={{cursor:"pointer",fontSize:13,color:p.color,lineHeight:1}}>×</span>

          ))}

        <div style={{flex:1,position:"relative"}}>
          <input value={q} onChange={e=>{setQ(e.target.value);setOpen(true)}} onFocus={()=>setOpen(true)} placeholder="기존 인맥에서 검색..."
            style={{width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:13,outline:"none",boxSizing:"border-box"}}/>
          {open && avail.length > 0 && (
            <div style={{position:"absolute",left:0,right:0,background:"#fff",border:"1px solid #e2e8f0",borderRadius:8,zIndex:300,boxShadow:"0 8px 24px rgba(0,0,0,0.1)",maxHeight:150,overflowY:"auto",marginTop:2}}>
              {avail.slice(0,8).map(p => (
                <div key={p.id} onMouseDown={()=>add(p.id)} style={{padding:"8px 12px",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:7}}
                  onMouseEnter={e=>e.currentTarget.style.background="#f8fafc"} onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <div style={{width:20,height:20,borderRadius:"50%",background:p.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:9,fontWeight:700}}>{p.name[0]}</div>
                  <span style={{fontWeight:600}}>{p.name}</span>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{p.job}{p.org?` · ${p.org}`:""}</span>
                </div>
              ))}
            </div>
          )}
        </div>
        <button onClick={()=>{setShowAdd(s=>!s);setOpen(false)}} style={{padding:"0 12px",borderRadius:7,border:"1px dashed #e2e8f0",background:showAdd?"#f1f5f9":"#fff",cursor:"pointer",fontSize:12,fontWeight:600,color:"#475569",whiteSpace:"nowrap"}}>+ 새 인물</button>

/* ── FileSection ── */
function FileSection({files, setFiles}) {
  const fileRef = useRef(null)
  const [preview, setPreview] = useState(null)
  const addFile = e => {
    const file = e.target.files[0]
    if (!file) return
    if (file.size > MAX_FILE) { alert("파일이 너무 커요 (최대 1.5MB)"); return }
    const reader = new FileReader()
    reader.onload = async ev => {
      const fObj = {id:"f"+uid(), name:file.name, type:file.type, size:file.size, data:ev.target.result}
      setFiles(fs => [...fs, fObj])
      try { await storage.set(`crm-file-${fObj.id}`, JSON.stringify(fObj)) } catch(err) { console.warn(err) }
    }
    reader.readAsDataURL(file)
    e.target.value = ""
  }
  const remove = async fid => {
    setFiles(fs => fs.filter(x=>x.id!==fid))
    try { await storage.delete(`crm-file-${fid}`) } catch(_) {}
  }
  const isImg = t => t?.startsWith("image/")
  return (
    <div>
      <input type="file" ref={fileRef} accept="image/*,.pdf" style={{display:"none"}} onChange={addFile}/>
      {files.length > 0 && (
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:6}}>
          {files.map(f => (
            <div key={f.id} style={{position:"relative",borderRadius:7,border:"1px solid #e2e8f0",overflow:"hidden",cursor:"pointer"}} onClick={()=>setPreview(f)}>
              {isImg(f.type)
                ? <img src={f.data} alt={f.name} style={{width:70,height:70,objectFit:"cover",display:"block"}}/>
                : <div style={{width:70,height:70,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#f8fafc",gap:2}}>
                    <span style={{fontSize:24}}>📄</span>
                    <span style={{fontSize:8,color:"#64748b",textAlign:"center",padding:"0 3px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:66}}>{f.name}</span>
                  </div>
              }
              <div onClick={e=>{e.stopPropagation();remove(f.id)}} style={{position:"absolute",top:2,right:2,width:16,height:16,borderRadius:"50%",background:"rgba(0,0,0,0.5)",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,cursor:"pointer",fontWeight:700}}>×</div>
            </div>
          ))}
        </div>
      )}
      <button onClick={()=>fileRef.current.click()} style={{padding:"7px 12px",borderRadius:7,border:"1px dashed #e2e8f0",background:"#fafafa",cursor:"pointer",fontSize:12,color:"#64748b",width:"100%"}}>📎 사진 / PDF 추가 (최대 1.5MB)</button>
      {preview && (
        <div onClick={()=>setPreview(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.75)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:12,padding:16,maxWidth:"88vw",maxHeight:"88vh",overflow:"auto",boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <span style={{fontSize:13,fontWeight:600,color:"#334155"}}>{preview.name}</span>
              <div style={{display:"flex",gap:8}}>
                <a href={preview.data} download={preview.name} style={{fontSize:12,color:"#6366f1",fontWeight:600,textDecoration:"none"}}>⬇ 다운로드</a>
                <button onClick={()=>setPreview(null)} style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#94a3b8",lineHeight:1}}>×</button>
              </div>
            </div>
            {isImg(preview.type)
              ? <img src={preview.data} alt={preview.name} style={{maxWidth:"80vw",maxHeight:"75vh",borderRadius:8,display:"block"}}/>
              : <iframe src={preview.data} title={preview.name} style={{width:"75vw",height:"72vh",border:"none",borderRadius:8}}/>
            }
          </div>
        </div>
      )}
    </div>
  )
}

/* ── Network Graph ── */
function NetworkGraph({people, connections, groups}) {
  const ref = useRef(null)
  useEffect(()=>{
    if (!ref.current) return
    const W = 860, H = 560
    const svg = d3.select(ref.current)
    svg.selectAll("*").remove()
    svg.attr("viewBox", `0 0 ${W} ${H}`)
    const meNode = {id:"__me__", name:"나", color:"#1e293b", x:W/2, y:H/2, fx:W/2, fy:H/2, isMe:true}
    const pNodes = people.map(p => ({...p}))
    const nm = Object.fromEntries(pNodes.map(n => [n.id, n]))
    const nodes = [meNode, ...pNodes]
    const groupColor = p => {
      if (p.groups && p.groups.length > 0) {
        const g = groups.find(x => x.id === p.groups[0])
        if (g) return g.color
      }
      return p.color || "#94a3b8"
    }
    const nodeR = p => p.isMe ? 24 : Math.max(14, 12+(((p.intimacy||3)-1)*2)+(((p.workImportance||3)-1)*1.5))
    const allLinks = []
    const edgeSet = new Set()
    connections.forEach(c => {
      const k = [c.from, c.to].sort().join("_")
      if (nm[c.from] && nm[c.to] && !edgeSet.has(k)) {
        edgeSet.add(k)
        allLinks.push({source:nm[c.from], target:nm[c.to], type:"explicit", reason:c.reason})
      }
    })
    people.forEach(p => {
      (p.relatedPeople||[]).forEach(mid => {
        const k = [p.id, mid].sort().join("_")
        if (!edgeSet.has(k) && nm[p.id] && nm[mid]) {
          edgeSet.add(k)
          allLinks.push({source:nm[p.id], target:nm[mid], type:"related"})
        }
      })
    })
    pNodes.forEach(p => { allLinks.push({source:meNode, target:p, type:"radial"}) })

    svg.append("defs").append("marker").attr("id","arr").attr("viewBox","0 -5 10 10").attr("refX",28).attr("markerWidth",5).attr("markerHeight",5).attr("orient","auto").append("path").attr("d","M0,-5L10,0L0,5").attr("fill","#64748b")
    const g = svg.append("g")
    svg.call(d3.zoom().scaleExtent([0.1,4]).on("zoom", e => g.attr("transform", e.transform)))
    const sim = d3.forceSimulation(nodes)
      .force("link", d3.forceLink(allLinks).distance(d => d.type==="radial"?210:d.type==="explicit"?120:90).strength(d => d.type==="radial"?0.2:d.type==="explicit"?0.7:0.3))
      .force("charge", d3.forceManyBody().strength(-260))
      .force("collide", d3.forceCollide(d => nodeR(d)+18))

    const mEl = g.append("g").selectAll("line").data(allLinks.filter(l=>l.type==="related")).enter().append("line").attr("stroke","#cbd5e1").attr("stroke-width",1.2).attr("stroke-dasharray","5,3")
    const lEl = g.append("g").selectAll("line").data(allLinks.filter(l=>l.type==="explicit")).enter().append("line").attr("stroke","#64748b").attr("stroke-width",1.8).attr("marker-end","url(#arr)")
    const lTxt = g.append("g").selectAll("text").data(allLinks.filter(l=>l.type==="explicit")).enter().append("text").attr("font-size",9).attr("fill","#94a3b8").attr("text-anchor","middle").text(d=>d.reason||"")

    const nG = g.append("g").selectAll("g").data(nodes).enter().append("g").style("cursor","grab")
      .call(d3.drag()
        .on("start", (e,d) => { if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y })
        .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y })
        .on("end",   (e,d) => { if(!e.active) sim.alphaTarget(0); if(!d.isMe){ d.fx=null; d.fy=null } })
      )

    const rec30 = Date.now() - 30*24*60*60*1000
    nG.filter(d => !d.isMe && (d.updatedAt||d.createdAt) > rec30)
      .append("circle").attr("r", d=>nodeR(d)+6).attr("fill","none").attr("stroke", d=>groupColor(d)).attr("stroke-width",1.5).attr("opacity",.35).attr("stroke-dasharray","3,3")
    nG.append("circle").attr("r", d=>nodeR(d)).attr("fill", d => d.isMe ? "#1e293b" : groupColor(d))
    nG.filter(d=>d.isMe).append("circle").attr("r", d=>nodeR(d)+4).attr("fill","none").attr("stroke","#1e293b").attr("stroke-width",2).attr("opacity",.25)
    nG.append("text").attr("dy","0.35em").attr("text-anchor","middle").attr("fill","#fff").attr("font-weight",700).attr("font-size", d=>d.isMe?13:Math.max(9,nodeR(d)*.55)).text(d => d.isMe?"나":d.name[0])
    nG.filter(d=>!d.isMe).append("text").attr("dy", d=>`${nodeR(d)+13}px`).attr("text-anchor","middle").attr("fill","#334155").attr("font-weight",600).attr("font-size",10).text(d=>d.name)
    nG.filter(d=>!d.isMe).append("text").attr("dy", d=>`${nodeR(d)+24}px`).attr("text-anchor","middle").attr("fill","#94a3b8").attr("font-size",8).text(d=>fmtYYMM(d.updatedAt||d.createdAt))

    sim.on("tick", () => {
      lEl.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y)
      mEl.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y)
      lTxt.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2-8)
      nG.attr("transform", d=>`translate(${d.x},${d.y})`)
    })
    return () => sim.stop()
  }, [people, connections, groups])

  return (
    <div style={{borderRadius:12,overflow:"hidden",border:"1px solid #e2e8f0",background:"#fafbfc"}}>
      <svg ref={ref} style={{display:"block",width:"100%",minHeight:560}}/>
      <div style={{padding:"6px 14px",fontSize:10,color:"#94a3b8",borderTop:"1px solid #f1f5f9",background:"#fff",display:"flex",gap:12,flexWrap:"wrap"}}>
        <span>🖱️ 드래그·줌</span><span>━ 직접연결</span><span>┄ 관련인물</span><span>● 크기=친밀+업무</span><span>● 색=그룹</span>
      </div>
    </div>
  )
}

/* ── Meeting Calendar ── */
function MeetingCalendar({meetings, people, onAdd, onEdit}) {
  const [view, setView] = useState(new Date())
  const yr = view.getFullYear()
  const mo = view.getMonth()
  const firstDow = (new Date(yr, mo, 1).getDay() + 6) % 7
  const total = new Date(yr, mo+1, 0).getDate()
  const mStr = `${yr}-${String(mo+1).padStart(2,"0")}`
  const byDay = {}
  meetings.filter(m=>m.date.startsWith(mStr)).forEach(m => {
    const d = parseInt(m.date.slice(8))
    if (!byDay[d]) byDay[d] = []
    byDay[d].push(m)
  })
  const gp = id => people.find(p=>p.id===id)
  const today = new Date()
  const isToday = d => today.getFullYear()===yr && today.getMonth()===mo && today.getDate()===d
  const cells = []
  for (let i=0; i<firstDow; i++) cells.push(null)
  for (let d=1; d<=total; d++) cells.push(d)
  return (
    <div style={{background:"#fff",borderRadius:12,border:"1px solid #e2e8f0",marginBottom:14}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"11px 16px",borderBottom:"1px solid #f1f5f9"}}>
        <button onClick={()=>setView(new Date(yr,mo-1,1))} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#64748b",lineHeight:1}}>‹</button>
        <span style={{fontWeight:700,fontSize:14}}>{yr}년 {mo+1}월</span>
        <button onClick={()=>setView(new Date(yr,mo+1,1))} style={{background:"none",border:"none",cursor:"pointer",fontSize:20,color:"#64748b",lineHeight:1}}>›</button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"3px 10px 0"}}>
        {["월","화","수","목","금","토","일"].map(d => (
          <div key={d} style={{textAlign:"center",padding:"5px 0",fontSize:10,fontWeight:600,color:d==="토"?"#60a5fa":d==="일"?"#f87171":"#94a3b8"}}>{d}</div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",padding:"0 10px 10px",gap:2}}>
        {cells.map((d,i) => !d ? <div key={`e${i}`}/> : (
          <div key={d} style={{minHeight:68,padding:"3px",borderRadius:6,background:isToday(d)?"#eff6ff":"transparent",border:`1px solid ${isToday(d)?"#bfdbfe":"transparent"}`}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:1}}>
              <span style={{fontSize:10,fontWeight:isToday(d)?700:400,color:isToday(d)?"#3b82f6":"#475569"}}>{d}</span>
              <span onClick={()=>onAdd(`${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`)} style={{fontSize:13,color:"#d1d5db",cursor:"pointer",fontWeight:700,lineHeight:1}}>+</span>
            </div>
            {(byDay[d]||[]).slice(0,3).map(m => {
              const col = gp(m.attendees?.[0])?.color || "#94a3b8"
              return (
                <div key={m.id} onClick={()=>onEdit(m)} style={{fontSize:9,padding:"2px 4px",borderRadius:3,background:col+"22",color:col,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",marginBottom:1,cursor:"pointer"}}>
                  {m.time && <span style={{opacity:.7}}>{m.time} </span>}{m.project}
                </div>
              )
            })}
            {(byDay[d]||[]).length > 3 && <div style={{fontSize:8,color:"#94a3b8"}}>+{byDay[d].length-3}</div>}
          </div>
        ))}
      </div>
    </div>
  )
}

      <Sec c="인사이트 & 다음 준비"/>
      <Lbl c="미팅 인사이트" mt={4}/><TA value={form.insights} onChange={e=>set("insights",e.target.value)} placeholder="이번 미팅에서 얻은 발견..."/>
      <Lbl c="다음 미팅 준비 키워드"/><Inp value={form.nextKeywords} onChange={e=>set("nextKeywords",e.target.value)} placeholder="다음을 위한 주제, 키워드..."/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:18}}>
        <div>{data && <Btn v="danger" onClick={()=>onDelete(data.id)}>삭제</Btn>}</div>
        <div style={{display:"flex",gap:8}}>
          <Btn v="secondary" onClick={onClose}>취소</Btn>
          <Btn onClick={handleSave}>저장</Btn>
        </div>
      </div>
    </Modal>
  )
}

/* ── Group Modal ── */
function GroupModal({data, onSave, onDelete, onClose}) {
  const [form, setForm] = useState(data || {name:"", color:PALETTE[0], members:[]})
  const set = (k,v) => setForm(f => ({...f, [k]:v}))
  return (
    <Modal title={data?"그룹 수정":"새 그룹"} onClose={onClose}>
      <Lbl c="그룹명 *" mt={4}/><Inp value={form.name} onChange={e=>set("name",e.target.value)} placeholder="그룹 이름" autoFocus/>
      <Lbl c="색상"/><Pal value={form.color} onChange={v=>set("color",v)}/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:18}}>
        <div>{data && <Btn v="danger" onClick={()=>onDelete(data.id)}>삭제</Btn>}</div>
        <div style={{display:"flex",gap:8}}>
          <Btn v="secondary" onClick={onClose}>취소</Btn>
          <Btn onClick={()=>form.name.trim() && onSave(form)}>저장</Btn>
        </div>

    </Modal>

}

/* ── Conn Modal ── */
function ConnModal({data, people, onSave, onDelete, onClose}) {
  const [form, setForm] = useState(data || {from:"", to:"", reason:""})
  const set = (k,v) => setForm(f => ({...f, [k]:v}))
  const ss = {width:"100%",padding:"8px 11px",borderRadius:7,border:"1px solid #e2e8f0",fontSize:13,outline:"none",background:"#fff"}
  return (
    <Modal title={data?"연결 수정":"연결 추가"} onClose={onClose}>
      <Lbl c="출발 인물" mt={4}/>
      <select value={form.from} onChange={e=>set("from",e.target.value)} style={ss}>
        <option value="">선택...</option>
        {people.map(p => <option key={p.id} value={p.id}>{p.name}{p.job?` (${p.job})`:""}</option>)}
      </select>
      <Lbl c="도착 인물"/>
      <select value={form.to} onChange={e=>set("to",e.target.value)} style={ss}>
        <option value="">선택...</option>
        {people.filter(p=>p.id!==form.from).map(p => <option key={p.id} value={p.id}>{p.name}{p.job?` (${p.job})`:""}</option>)}
      </select>
      <Lbl c="연결 이유"/><Inp value={form.reason} onChange={e=>set("reason",e.target.value)} placeholder="ex) 전 직장 동료"/>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:18}}>
        <div>{data && <Btn v="danger" onClick={()=>onDelete(data.id)}>삭제</Btn>}</div>
        <div style={{display:"flex",gap:8}}>
          <Btn v="secondary" onClick={onClose}>취소</Btn>
          <Btn onClick={()=>form.from && form.to && form.from!==form.to && onSave(form)}>저장</Btn>
        </div>
      </div>
    </Modal>
  )
}

/* ── Person Card ── */
function PersonCard({p, groups, onClick}) {
  const pG = p.groups.map(id => groups.find(g=>g.id===id)).filter(Boolean)
  return (
    <div onClick={onClick} style={{background:"#fff",borderRadius:10,padding:11,border:"1px solid #e2e8f0",cursor:"pointer",borderLeft:`4px solid ${p.color}`,transition:"box-shadow .15s"}}
      onMouseEnter={e=>e.currentTarget.style.boxShadow="0 4px 14px rgba(0,0,0,0.08)"}
      onMouseLeave={e=>e.currentTarget.style.boxShadow="none"}>
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
        <div style={{width:30,height:30,borderRadius:"50%",background:p.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:12,flexShrink:0}}>{p.name[0]}</div>
        <div style={{overflow:"hidden",flex:1}}>
          <div style={{fontWeight:700,fontSize:12,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{p.name}</div>
          <div style={{fontSize:10,color:"#94a3b8",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{[p.job,p.org].filter(Boolean).join(" · ")||"—"}</div>
        </div>
      </div>
      {pG.length > 0 && (
        <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
          {pG.map(g => <span key={g.id} style={{fontSize:9,padding:"2px 6px",borderRadius:20,background:g.color+"22",color:g.color,fontWeight:600}}>{g.name}</span>)}
        </div>
      )}
    </div>
  )
}

/* ── Main App ── */
function WeMet() {
  const [loaded, setLoaded] = useState(false)
  const [tab, setTab] = useState("people")
  const [people, setPeople] = useState(IP)
  const [groups, setGroups] = useState(IG)
  const [connections, setConnections] = useState(IC)
  const [meetings, setMeetings] = useState(IM)
  const [orgs, setOrgs] = useState(IORGS)
  const [modal, setModal] = useState(null)
  const [saveStatus, setSaveStatus] = useState("saved")

  useEffect(() => {
    const load = async () => {
      try {
        const keys = ["crm-people","crm-groups","crm-connections","crm-meetings","crm-orgs"]
        const [rp,rg,rc,rm,ro] = await Promise.all(keys.map(k => storage.get(k).catch(()=>null)))
        if (rp?.value) setPeople(JSON.parse(rp.value))
        if (rg?.value) setGroups(JSON.parse(rg.value))
        if (rc?.value) setConnections(JSON.parse(rc.value))
        if (rm?.value) setMeetings(JSON.parse(rm.value))
        if (ro?.value) setOrgs(JSON.parse(ro.value))
      } catch(_) {}
      setLoaded(true)
    }
    load()
  }, [])

  const saveTimer = useRef(null)
  const persist = (ps, gs, cs, ms, os) => {
    setSaveStatus("saving")
    clearTimeout(saveTimer.current)
    saveTimer.current = setTimeout(async () => {
      try {
        const vals = [ps, gs, cs, ms, os]
        await Promise.all(["crm-people","crm-groups","crm-connections","crm-meetings","crm-orgs"].map((k,i) => storage.set(k, JSON.stringify(vals[i]))))
        setSaveStatus("saved")
      } catch(_) { setSaveStatus("error") }
    }, 700)
  }
  useEffect(() => { if (loaded) persist(people, groups, connections, meetings, orgs) }, [people, groups, connections, meetings, orgs])

  const gp = id => people.find(p => p.id===id)
  const gg = id => groups.find(g => g.id===id)
  const close = () => setModal(null)
  const mCount = meetings.filter(m => m.date.startsWith(new Date().toISOString().slice(0,7))).length
  const addOrgIfNew = v => { if (v?.trim() && !orgs.includes(v.trim())) setOrgs(os => [v.trim(), ...os]) }
  const createGroupInline = name => {
    const ng = {id:"g"+uid(), name, color:PALETTE[groups.length%PALETTE.length], members:[], createdAt:Date.now()}
    setGroups(gs => [ng, ...gs])
    return ng
  }
  const createPersonInline = partial => {
    const np = {
      name:partial.name, job:partial.job||"", org:"", contact:"", notes:emptyNotes(),
      relatedPeople:[], intimacy:3, workImportance:3, groups:[],
      color:PALETTE[people.length%PALETTE.length],
      id:"p"+uid(), date:todayStr(), createdAt:Date.now(), updatedAt:Date.now()
    }
    setPeople(ps => [np, ...ps])
    return np
  }

  const savePerson = data => {
    addOrgIfNew(data.org)
    const ts = Date.now()
    if (data.id) {
      setPeople(ps => ps.map(x => x.id===data.id ? {...data, updatedAt:ts} : x))
      setGroups(gs => gs.map(g => ({...g, members: data.groups.includes(g.id) ? [...new Set([...g.members, data.id])] : g.members.filter(m=>m!==data.id)})))
    } else {
      const np = {...data, id:"p"+uid(), date:todayStr(), createdAt:ts, updatedAt:ts}
      setPeople(ps => [np, ...ps])
      setGroups(gs => gs.map(g => ({...g, members: np.groups.includes(g.id) ? [np.id, ...g.members] : g.members})))
    }
    close()
  }
  const deletePerson = id => {
    setPeople(ps => ps.filter(x=>x.id!==id).map(p => ({...p, relatedPeople:(p.relatedPeople||[]).filter(m=>m!==id)})))
    setConnections(cs => cs.filter(c => c.from!==id && c.to!==id))
    setGroups(gs => gs.map(g => ({...g, members:g.members.filter(m=>m!==id)})))
    setMeetings(ms => ms.map(m => ({...m, attendees:m.attendees.filter(a=>a!==id)})))
    close()
  }
  const saveGroup = data => {
    if (data.id) setGroups(gs => gs.map(x => x.id===data.id ? {...x,...data} : x))
    else setGroups(gs => [{...data, id:"g"+uid(), members:[], createdAt:Date.now()}, ...gs])
    close()
  }
  const deleteGroup = id => {
    setGroups(gs => gs.filter(x=>x.id!==id))
    setPeople(ps => ps.map(p => ({...p, groups:p.groups.filter(g=>g!==id)})))
    close()
  }
  const saveConn = data => {
    if (data.id) setConnections(cs => cs.map(x => x.id===data.id ? data : x))
    else setConnections(cs => [{...data, id:"c"+uid(), createdAt:Date.now()}, ...cs])
    close()
  }
  const deleteConn = id => { setConnections(cs => cs.filter(x=>x.id!==id)); close() }
  const saveMeeting = data => {
    if (data.id) setMeetings(ms => ms.map(x => x.id===data.id ? data : x))
    else setMeetings(ms => [{...data, createdAt:Date.now()}, ...ms])
    close()
  }
  const deleteMeeting = async id => {
    const m = meetings.find(x=>x.id===id)
    if (m?.filesMeta?.length) {
      await Promise.all(m.filesMeta.map(fm => storage.delete(`crm-file-${fm.id}`).catch(()=>{})))
    }
    setMeetings(ms => ms.filter(x=>x.id!==id))
    close()
  }
  const downloadHTML = () => {
    const html = document.documentElement.outerHTML
    const blob = new Blob([html], {type: "text/html;charset=utf-8"})
    const a = document.createElement("a")
    a.href = URL.createObjectURL(blob)
    a.download = "wemet.html"
    a.click()
    URL.revokeObjectURL(a.href)
  }
  const exportExcel = () => {
    const wb = XLSX.utils.book_new()
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
      [...people].sort((a,b)=>b.createdAt-a.createdAt).map(p => ({
        이름:p.name, 직업:p.job, 소속:p.org, 연락처:p.contact,
        그룹:p.groups.map(id=>gg(id)?.name||"").join(", "),
        친밀도:p.intimacy, 업무중요도:p.workImportance,
        관계시작:p.notes?.relationStart, 스킬:p.notes?.skills,
        예전직함:p.notes?.pastTitles, 관심사:p.notes?.interests, 메모:p.notes?.memo
      }))
    ), "사람들")
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(
      [...meetings].sort((a,b)=>b.date.localeCompare(a.date)).map(m => ({
        날짜:m.date, 시간:m.time, 주제:m.project,
        참석자:m.attendees.map(id=>gp(id)?.name||"").join(", "),
        메모:m.memo, 만족도:m.rating, 자료:m.materialsToSend,
        다음연락:m.nextContactDate, 인사이트:m.insights, 키워드:m.nextKeywords
      }))
    ), "미팅")
    XLSX.writeFile(wb, `WeMet_${todayStr()}.xlsx`)
  }

  const sG = [...groups].sort((a,b) => b.createdAt-a.createdAt)
  const sP = [...people].sort((a,b) => b.createdAt-a.createdAt)
  const gSec = [
    ...sG.map(g => ({id:g.id, label:g.name, color:g.color, members:sP.filter(p=>p.groups.includes(g.id))})),
    {id:"none", label:"미분류", color:"#94a3b8", members:sP.filter(p=>p.groups.length===0)}
  ].filter(s => s.members.length > 0)

  const newMeetingData = date => ({
    date: date||todayStr(), time:"", project:"", attendees:[],
    memo:"", rating:0, materialsToSend:"", nextContactDate:"",
    insights:"", nextKeywords:"", filesMeta:[]
  })

  if (!loaded) {
    return (
      <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"system-ui",color:"#94a3b8"}}>
        WeMet 불러오는 중...
      </div>
    )
  }

  return (
    <div style={{fontFamily:"'Inter',system-ui,sans-serif",background:"#f8fafc",minHeight:"100vh",color:"#1e293b"}}>
      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1px solid #e2e8f0",padding:"10px 18px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,gap:8}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:18}}>🫂</span>
          <span style={{fontWeight:800,fontSize:16,letterSpacing:-.5,whiteSpace:"nowrap"}}>WeMet</span>
        </div>
        <div style={{display:"flex",gap:2}}>
          {[["people","👤 사람들"],["groups","🏷️ 그룹"],["connections","🔗 연결"],["meetings","📅 미팅"]].map(([t,l]) => (
            <button key={t} onClick={()=>setTab(t)} style={{padding:"5px 11px",borderRadius:7,border:"none",cursor:"pointer",fontSize:12,fontWeight:500,background:tab===t?"#1e293b":"transparent",color:tab===t?"#fff":"#64748b"}}>{l}</button>
          ))}
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:10,color:saveStatus==="error"?"#ef4444":saveStatus==="saving"?"#f59e0b":"#10b981",whiteSpace:"nowrap"}}>
            {saveStatus==="saving"?"💾 저장 중...":saveStatus==="saved"?"✓ 저장됨":"⚠ 실패"}
          </span>
          <Btn v="green" s={{padding:"5px 11px",fontSize:11}} onClick={exportExcel}>⬇ 엑셀</Btn>
          <Btn s={{padding:"5px 11px",fontSize:11,background:"#4f46e5",color:"#fff"}} onClick={downloadHTML}>💾 HTML 저장</Btn>
        </div>
      </div>

      <div style={{padding:"14px 18px",maxWidth:1100,margin:"0 auto"}}>
        {/* Stats */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:14}}>
          {[["👥","총 인맥",people.length,"#6366f1"],["🏷️","그룹",groups.length,"#10b981"],["🔗","연결",connections.length,"#f59e0b"],["📅","이번달 미팅",mCount,"#ef4444"]].map(([ic,lb,val,col]) => (
            <div key={lb} style={{background:"#fff",borderRadius:10,padding:"11px 14px",border:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:9}}>
              <span style={{fontSize:18}}>{ic}</span>
              <div>
                <div style={{fontSize:22,fontWeight:800,color:col,lineHeight:1}}>{val}</div>
                <div style={{fontSize:10,color:"#94a3b8",marginTop:1}}>{lb}</div>
              </div>
            </div>
          ))}
        </div>

        {/* People Tab */}
        {tab==="people" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:15}}>인맥 목록 <span style={{fontSize:12,color:"#94a3b8",fontWeight:400}}>{people.length}명</span></span>
              <Btn onClick={()=>setModal({type:"person",data:null})}>+ 추가</Btn>
            </div>
            {gSec.map(sec => (
              <div key={sec.id} style={{marginBottom:16}}>
                <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:7}}>
                  <div style={{width:7,height:7,borderRadius:"50%",background:sec.color,flexShrink:0}}/>
                  <span style={{fontWeight:700,fontSize:12,color:sec.color}}>{sec.label}</span>
                  <span style={{fontSize:11,color:"#cbd5e1"}}>{sec.members.length}명</span>
                  <div style={{flex:1,height:1,background:"#f1f5f9"}}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(165px,1fr))",gap:8}}>
                  {sec.members.map(p => <PersonCard key={p.id} p={p} groups={groups} onClick={()=>setModal({type:"person",data:p})}/>)}
                </div>
              </div>
            ))}
          </div>
        )}

        {/* Groups Tab */}
        {tab==="groups" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:15}}>그룹</span>
              <Btn onClick={()=>setModal({type:"group",data:null})}>+ 추가</Btn>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
              {sG.map(g => (
                <div key={g.id} style={{background:"#fff",borderRadius:10,padding:16,border:"1px solid #e2e8f0"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                    <div style={{display:"flex",alignItems:"center",gap:7}}>
                      <div style={{width:9,height:9,borderRadius:"50%",background:g.color}}/>
                      <span style={{fontWeight:700,fontSize:14}}>{g.name}</span>
                      <span style={{fontSize:11,color:"#94a3b8"}}>{g.members.length}명</span>
                    </div>
                    <button onClick={()=>setModal({type:"group",data:g})} style={{background:"none",border:"none",cursor:"pointer",fontSize:13,color:"#94a3b8"}}>✏️</button>
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                    {!g.members.length && <span style={{fontSize:11,color:"#cbd5e1"}}>멤버 없음</span>}
                    {g.members.map(mid => {
                      const p = gp(mid)
                      return p ? (
                        <div key={mid} style={{display:"flex",alignItems:"center",gap:4,background:"#f8fafc",borderRadius:7,padding:"4px 7px"}}>
                          <div style={{width:16,height:16,borderRadius:"50%",background:p.color,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontSize:8,fontWeight:700}}>{p.name[0]}</div>
                          <div>
                            <div style={{fontSize:11,fontWeight:600,lineHeight:1.2}}>{p.name}</div>
                            {p.org && <div style={{fontSize:9,color:"#94a3b8"}}>{p.org}</div>}
                          </div>
                        </div>
                      ) : null
                    })}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Connections Tab */}
        {tab==="connections" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:15}}>연결관계 네트워크</span>
              <Btn onClick={()=>setModal({type:"connection",data:null})}>+ 추가</Btn>
            </div>
            <NetworkGraph people={people} connections={connections} groups={groups}/>
            <div style={{marginTop:10,display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>
              {[...connections].sort((a,b)=>b.createdAt-a.createdAt).map(c => {
                const fp = gp(c.from), tp = gp(c.to)
                return (
                  <div key={c.id} onClick={()=>setModal({type:"connection",data:c})} style={{background:"#fff",borderRadius:9,padding:"10px 12px",border:"1px solid #e2e8f0",display:"flex",alignItems:"center",gap:6,cursor:"pointer"}}>
                    <Av p={fp}/>
                    <div style={{flex:1,textAlign:"center"}}>
                      <div style={{fontSize:12,color:"#cbd5e1"}}>→</div>
                      <div style={{fontSize:10,color:"#64748b"}}>{c.reason}</div>
                    </div>
                    <Av p={tp}/>
                  </div>
                )
              })}
            </div>
          </div>
        )}

        {/* Meetings Tab */}
        {tab==="meetings" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <span style={{fontWeight:700,fontSize:15}}>미팅</span>
              <Btn onClick={()=>setModal({type:"meeting",data:null})}>+ 추가</Btn>
            </div>
            <MeetingCalendar meetings={meetings} people={people} onAdd={date=>setModal({type:"meeting",data:newMeetingData(date)})} onEdit={m=>setModal({type:"meeting",data:m})}/>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {[...meetings].sort((a,b)=>b.date.localeCompare(a.date)).map(m => (
                <div key={m.id} onClick={()=>setModal({type:"meeting",data:m})} style={{background:"#fff",borderRadius:10,padding:"12px 14px",border:"1px solid #e2e8f0",cursor:"pointer",display:"flex",gap:12,alignItems:"flex-start"}}>
                  <div style={{background:"#f1f5f9",borderRadius:9,padding:"7px 10px",textAlign:"center",minWidth:42,flexShrink:0}}>
                    <div style={{fontSize:9,color:"#94a3b8",fontWeight:600}}>{m.date.slice(5,7)}월</div>
                    <div style={{fontWeight:800,fontSize:18,lineHeight:1,color:"#1e293b"}}>{m.date.slice(8,10)}</div>
                  </div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap",marginBottom:2}}>
                      <span style={{fontWeight:700,fontSize:13}}>{m.project}</span>
                      {m.time && <span style={{fontSize:10,color:"#94a3b8"}}>{m.time}</span>}
                      {m.rating > 0 && <span style={{fontSize:10,color:"#f59e0b",letterSpacing:-1}}>{"★".repeat(m.rating)}{"☆".repeat(5-m.rating)}</span>}
                      {m.nextContactDate && <span style={{fontSize:9,padding:"1px 6px",borderRadius:10,background:"#fef3c7",color:"#d97706",fontWeight:600}}>📩 {m.nextContactDate}</span>}
                      {m.filesMeta?.length > 0 && <span style={{fontSize:9,padding:"1px 6px",borderRadius:10,background:"#f0f9ff",color:"#0369a1",fontWeight:600}}>📎 {m.filesMeta.length}개</span>}
                    </div>
                    <div style={{fontSize:11,color:"#64748b",marginBottom:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.memo}</div>
                    <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                      {m.attendees.map(id => {
                        const p = gp(id)
                        return p ? <span key={id} style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:p.color+"22",color:p.color,fontWeight:600}}>{p.name}</span> : null
                      })}
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
      </div>

      {/* Modals */}
      {modal?.type==="person"     && <PersonModal     data={modal.data} groups={groups} orgs={orgs} people={people} onSave={savePerson}  onDelete={deletePerson}  onClose={close} onCreateGroup={createGroupInline} onCreatePerson={createPersonInline}/>}
      {modal?.type==="group"      && <GroupModal      data={modal.data} onSave={saveGroup}   onDelete={deleteGroup}   onClose={close}/>}
      {modal?.type==="connection" && <ConnModal       data={modal.data} people={people} onSave={saveConn}    onDelete={deleteConn}    onClose={close}/>}
      {modal?.type==="meeting"    && <MeetingModal    data={modal.data} people={people} onSave={saveMeeting} onDelete={deleteMeeting} onClose={close}/>}
    </div>
  )
}

ReactDOM.render(<WeMet/>, document.getElementById("root"))
</script>
</body>
</html>
